<!doctype html><html><head><meta charset="utf-8"><title>Type pairing</title>
<style>
  @import url("../colors_and_type.css");
  html,body{margin:0;background:var(--background);font-family:var(--font-sans);}
  body{padding:24px 28px;}
  .lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3em;color:#b6191a;margin-bottom:10px;}
  h1{font-family:var(--font-serif);font-weight:400;font-size:42px;line-height:1.05;letter-spacing:-.02em;color:#000f22;margin:0 0 14px 0;}
  h1 em{font-style:italic;color:#0a2540;}
  p{margin:0;font-size:15px;line-height:1.6;color:#1b1c1a;max-width:60ch;}
  .pin{border-left:1px solid #d4af37;padding-left:14px;}
</style></head><body>
<div class="pin">
  <div class="lbl">Morning brief · Oct 23</div>
  <h1>District&nbsp;4 remains a high‑volatility zone as primary <em>filing deadlines</em> approach.</h1>
  <p>Internal polling indicates consolidation of grassroots support in the southeast corridor. Three new entries flagged for secondary review.</p>
</div>
</body></html>
