<!doctype html><html><head><meta charset="utf-8"><title>Text colors</title>
<style>
  @import url("../colors_and_type.css");
  html,body{margin:0;background:var(--background);font-family:var(--font-sans);}
  body{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .panel{padding:18px 20px;border-radius:var(--radius-lg);}
  .cream{background:#fbf9f5;}
  .navy{background:#000f22;}
  .line{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;}
  .line .t{font-size:14px;}
  .line .h{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;opacity:.55;}
  .lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.25em;margin-bottom:8px;}
  .cream .lbl{color:#74777e;}
  .navy  .lbl{color:#d4af37;}
</style></head><body>
<div class="panel cream">
  <div class="lbl">On cream</div>
  <div class="line"><span class="t" style="color:#000f22;font-weight:600;">fg-1 · Display / headline</span><span class="h" style="color:#000f22;">#000F22</span></div>
  <div class="line"><span class="t" style="color:#1b1c1a;">fg-2 · Body</span><span class="h" style="color:#1b1c1a;">#1B1C1A</span></div>
  <div class="line"><span class="t" style="color:#43474d;">fg-3 · Secondary</span><span class="h" style="color:#43474d;">#43474D</span></div>
  <div class="line"><span class="t" style="color:#74777e;">fg-4 · Metadata</span><span class="h" style="color:#74777e;">#74777E</span></div>
</div>
<div class="panel navy">
  <div class="lbl">On navy</div>
  <div class="line"><span class="t" style="color:#fbf9f5;font-weight:600;">fg-inv-1 · Display</span><span class="h" style="color:rgba(251,249,245,.55);">#FBF9F5</span></div>
  <div class="line"><span class="t" style="color:rgba(251,249,245,.72);">fg-inv-2 · Body</span><span class="h" style="color:rgba(251,249,245,.55);">72%</span></div>
  <div class="line"><span class="t" style="color:rgba(251,249,245,.48);">fg-inv-3 · Secondary</span><span class="h" style="color:rgba(251,249,245,.55);">48%</span></div>
  <div class="line"><span class="t" style="color:#d4af37;font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:11px;">Accent · Gold</span><span class="h" style="color:#d4af37;">#D4AF37</span></div>
</div>
</body></html>
