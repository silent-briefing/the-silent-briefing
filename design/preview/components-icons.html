<!doctype html><html><head><meta charset="utf-8"><title>Icons</title>
<style>
  @import url("../colors_and_type.css");
  html,body{margin:0;background:var(--background);font-family:var(--font-sans);}
  body{padding:22px 26px;display:grid;grid-template-columns:repeat(8,1fr);gap:18px 12px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .cell svg{width:22px;height:22px;stroke:#000f22;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
  .n{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:#74777e;}
</style></head><body>
<!-- Lucide-style line icons at 1.5px -->
<div class="cell"><svg viewBox="0 0 24 24"><path d="M12 2 3 6v6c0 5 3.5 9 9 10 5.5-1 9-5 9-10V6z"/></svg><div class="n">Shield</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9"/><path d="M16 3.1a4 4 0 0 1 0 7.75"/></svg><div class="n">Users</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/></svg><div class="n">File</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg><div class="n">Clock</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg><div class="n">Alert</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3 9-9"/></svg><div class="n">Check</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><div class="n">Link</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg><div class="n">Download</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><div class="n">Search</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54z"/></svg><div class="n">Filter</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><div class="n">Bell</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><circle cx="9" cy="19" r="2"/><circle cx="9" cy="5" r="2"/><circle cx="19" cy="12" r="2"/><path d="M9 7v10M10.5 18l7-5M10.5 6l7 5"/></svg><div class="n">Compare</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg><div class="n">Back</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg><div class="n">Next</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg><div class="n">Archive</div></div>
<div class="cell"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><div class="n">Lock</div></div>
</body></html>
