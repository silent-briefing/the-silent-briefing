<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<style>
  @import url("../colors_and_type.css");
  html,body{margin:0;background:var(--background);font-family:var(--font-sans);}
  body{padding:22px 26px;}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .row .lbl{font-size:10px;font-weight:700;color:#74777e;letter-spacing:.2em;text-transform:uppercase;min-width:56px;}
  .row .px{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:#43474d;min-width:40px;text-align:right;}
  .bar{background:#d4af37;height:10px;border-radius:2px;}
</style></head><body>
<div class="row"><span class="lbl">space‑1</span><span class="px">4px</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="lbl">space‑2</span><span class="px">8px</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="lbl">space‑4</span><span class="px">16px</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="lbl">space‑6</span><span class="px">24px</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="lbl">space‑8</span><span class="px">32px</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="lbl">space‑12</span><span class="px">48px</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="lbl">space‑16</span><span class="px">64px</span><span class="bar" style="width:64px"></span></div>
<div class="row"><span class="lbl">space‑20</span><span class="px">80px</span><span class="bar" style="width:80px"></span></div>
<div class="row"><span class="lbl">space‑24</span><span class="px">96px</span><span class="bar" style="width:96px"></span></div>
</body></html>
