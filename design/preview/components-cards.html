<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<style>
  @import url("../colors_and_type.css");
  html,body{margin:0;background:#f5f3ef;font-family:var(--font-sans);}
  body{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 2px rgba(0,15,34,.04);}
  .featured{border-top:2px solid #d4af37;}
  .lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.25em;color:#74777e;margin-bottom:10px;}
  .gold{color:#d4af37;}
  h3{font-family:var(--font-serif);font-weight:500;font-size:20px;color:#000f22;margin:0 0 10px 0;letter-spacing:-.01em;}
  p{margin:0;font-size:13px;line-height:1.55;color:#43474d;}
  .num{font-family:var(--font-serif);font-size:36px;color:#000f22;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:6px;}
</style></head><body>
<div class="card">
  <div class="lbl">Active filings</div>
  <div class="num">14</div>
  <p>Across 5 SLCO districts this cycle.</p>
</div>
<div class="card featured">
  <div class="lbl gold">Priority briefing</div>
  <h3>District 4 primary filing closes Friday</h3>
  <p>Three new dossiers ready for delegate review. Last sync 14:02 MT.</p>
</div>
</body></html>
