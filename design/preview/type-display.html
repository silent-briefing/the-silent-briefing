<!doctype html><html><head><meta charset="utf-8"><title>Display type</title>
<style>
  @import url("../colors_and_type.css");
  html,body{margin:0;background:var(--background);color:var(--fg-1);font-family:var(--font-sans);}
  body{padding:26px 28px;}
  .row{display:flex;align-items:baseline;gap:18px;margin-bottom:14px;}
  .row .lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.25em;color:var(--fg-4);min-width:120px;}
  .serif{font-family:var(--font-serif);font-weight:400;letter-spacing:-.018em;color:var(--fg-1);}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--fg-3);margin-left:auto;}
</style></head><body>
<div class="row"><span class="lbl">Display 2XL</span><span class="serif" style="font-size:60px;line-height:1.02;">The Salt Lake <em style="font-style:italic;">briefing</em></span></div>
<div class="row"><span class="lbl">Display LG</span><span class="serif" style="font-size:42px;line-height:1.05;">District 4 · operational</span></div>
<div class="row"><span class="lbl">Headline LG</span><span class="serif" style="font-size:30px;line-height:1.1;">Recent candidate filings</span></div>
<div class="row"><span class="lbl">Headline MD</span><span class="serif" style="font-size:22px;line-height:1.2;">Executive profile</span></div>
</body></html>
