<!doctype html><html><head><meta charset="utf-8"><title>Primary palette</title>
<style>
  @import url("../colors_and_type.css");
  html,body{margin:0;background:var(--background);font-family:var(--font-sans);}
  body{padding:22px 24px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:70px;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
  .chip .tick{position:absolute;left:10px;top:10px;width:14px;height:1px;background:#d4af37;opacity:.55;}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--fg-3);letter-spacing:.02em;}
  .name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--fg-1);}
  .role{font-size:10px;color:var(--fg-4);letter-spacing:.02em;}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#000f22;"><span class="tick"></span></div>
    <div class="name">Primary</div><div class="hex">#000F22</div><div class="role">Deep navy · authority</div></div>
  <div class="sw"><div class="chip" style="background:#0a2540;"><span class="tick"></span></div>
    <div class="name">Primary container</div><div class="hex">#0A2540</div><div class="role">Nav band, hero gradient</div></div>
  <div class="sw"><div class="chip" style="background:#b6191a;"><span class="tick" style="background:#fbf9f5;"></span></div>
    <div class="name">Secondary</div><div class="hex">#B6191A</div><div class="role">Crimson · signal only</div></div>
  <div class="sw"><div class="chip" style="background:#d4af37;"><span class="tick" style="background:#000f22;"></span></div>
    <div class="name">Tertiary</div><div class="hex">#D4AF37</div><div class="role">Gold · pinstripe, focus</div></div>
</div>
</body></html>
