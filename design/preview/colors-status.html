<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title>
<style>
  @import url("../colors_and_type.css");
  html,body{margin:0;background:var(--background);font-family:var(--font-sans);}
  body{padding:22px 24px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:50px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:#fbf9f5;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--fg-3);}
  .role{font-size:10px;color:var(--fg-4);}
  h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.25em;color:var(--fg-4);margin:0 0 12px 0;}
</style></head><body>
<h4>Status tokens</h4>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#2f7d4a;">Vetted</div><div class="hex">#2F7D4A</div><div class="role">Verified, clean</div></div>
  <div class="sw"><div class="chip" style="background:#a97b17;">Pending</div><div class="hex">#A97B17</div><div class="role">Under review</div></div>
  <div class="sw"><div class="chip" style="background:#b6191a;">Flagged</div><div class="hex">#B6191A</div><div class="role">Critical discrepancy</div></div>
  <div class="sw"><div class="chip" style="background:#74777e;">Unknown</div><div class="hex">#74777E</div><div class="role">No data</div></div>
</div>
</body></html>
