name: Baseline extraction smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync
      - name: Install Playwright browser (for optional SLCO in future)
        run: uv run playwright install chromium --with-deps
      - name: Dry-run baseline extraction (vote.utah only)
        run: uv run python -m briefing.worker baseline-extraction --dry-run --sources vote_utah
